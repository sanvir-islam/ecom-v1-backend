# /etc/nginx/sites-available/thecaliforniapickle.com
# Symlink to sites-enabled: ln -s /etc/nginx/sites-available/thecaliforniapickle.com /etc/nginx/sites-enabled/

# ─── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name thecaliforniapickle.com www.thecaliforniapickle.com api.thecaliforniapickle.com;
    return 301 https://$host$request_uri;
}

# ─── Redirect www → non-www (HTTPS) ──────────────────────────────────────────
server {
    listen 443 ssl;
    server_name www.thecaliforniapickle.com;

    ssl_certificate     /etc/letsencrypt/live/thecaliforniapickle.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thecaliforniapickle.com/privkey.pem;

    return 301 https://thecaliforniapickle.com$request_uri;
}

# ─── Frontend (Next.js) ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name thecaliforniapickle.com;

    ssl_certificate     /etc/letsencrypt/live/thecaliforniapickle.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thecaliforniapickle.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── Backend API (Express) ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.thecaliforniapickle.com;

    ssl_certificate     /etc/letsencrypt/live/api.thecaliforniapickle.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.thecaliforniapickle.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Stripe webhook needs raw body — no buffering
    location /api/payments/webhook {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    location / {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
